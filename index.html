<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPONI | Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --main-width: 400px;
      --pfp-size: 160px;
      --discord-pfp-size: 60px;
      --social-icon-size: 50px;
      --font-h1: 40px;
      --font-quote: 20px;
      --font-normal: 13px;
      --font-small: 11px;
    }

    *{ margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", Arial, sans-serif; }
    body{ height:100vh; width: 100vw; overflow:hidden; background:#000; color:#fff; display: flex; justify-content: center; align-items: center; }

    /* الأنيميشن الجديد */
    @keyframes flagPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #bgBlur{ position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; filter:blur(25px) brightness(0.4); z-index:-4; }
    #bgVideo{ position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-3; }
    .bg-dark{ position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:-2; }

    #overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.98); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; transition: opacity 1s ease; }
    #overlay span{ font-size:30px; font-weight:900; color:#fff; text-transform:uppercase; letter-spacing: 2px;}

    .main{ display:none; z-index: 1; height:100vh; justify-content:center; align-items:center; padding:16px; }
    .wrap{ width:var(--main-width); max-width:95vw; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; }

    .reveal{ opacity:0; transform:translateY(15px); filter:blur(10px); transition:opacity 800ms ease, transform 800ms ease, filter 800ms ease; }
    .reveal.show{ opacity:1; transform:translateY(0); filter:blur(0); }

    .pfp-wrap{ position:relative; width:var(--pfp-size); height:var(--pfp-size); }
    .pfpBase{ width:130px; height:130px; border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); object-fit:cover; z-index:1; border:3px solid rgba(255,255,255,0.95); box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    .pfpDecor{ position:absolute; width: 100%; height:100%; top:0; left:0; object-fit:contain; z-index:2; pointer-events:none; }

    h1{ font-size:var(--font-h1); font-weight:900; font-style: italic; text-transform: uppercase; letter-spacing:1px; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    .quote{ font-size:var(--font-quote); font-weight: 500; opacity:0.9; font-style: italic; color: #eee; padding: 0 10px;}

    .discord{
      width:100%;
      background: linear-gradient(135deg, #000000 33.3%, #FF0000 33.3% 66.6%, #FFCC00 66.6%);
      background-size: 300% 300%;
      animation: flagPulse 8s ease infinite;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:20px;
      padding:15px;
      display:flex;
      align-items:center;
      gap:15px;
      text-align: left;
      position: relative;
      overflow: hidden;
      margin-top: 5px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .discord::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1;
    }

    .miniPfpWrap, #activityImage, .discord-info { z-index: 2; }
    .miniPfpWrap{ position:relative; width:var(--discord-pfp-size); height:var(--discord-pfp-size); flex-shrink:0; }
    #discordAvatar{ width:var(--discord-pfp-size); height:var(--discord-pfp-size); border-radius:50%; border:2px solid rgba(255,255,255,0.8); }
    #discordDecorMini{ position:absolute; inset:-8px; width:76px; height:76px; z-index:2; }
    #activityImage { width: var(--discord-pfp-size); height: var(--discord-pfp-size); border-radius: 10px; display: none; object-fit: cover; border:2px solid rgba(255,255,255,0.6); }

    .discord-info{ flex:1; overflow:hidden; }
    #discordName{ font-size:16px; font-weight:800; font-style: italic; margin-bottom: 1px; color: #fff; }
    #discordStatusText{ font-size:var(--font-small); opacity:0.9; display:flex; align-items:center; gap:5px; color: #ddd; }
    #discordActivity{ margin-top:1px; font-size:var(--font-small); opacity:0.7; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

    .status-img { width: 14px; height: 14px; object-fit: contain; vertical-align: middle; }
    .socials{ margin-top:10px; display:flex; gap:12px; }
    .socials a{ width:var(--social-icon-size); height:var(--social-icon-size); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#fff; background:rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); backdrop-filter:blur(5px); transition:transform .25s ease, background-color .2s ease; font-size:24px; text-decoration: none; z-index: 2; }
    .socials a:hover{ transform:scale(1.1); background:rgba(255,255,255,0.2); }
    .views{ margin-top:10px; font-size:var(--font-small); opacity:0.7; display:flex; align-items:center; gap:6px; width:100%; justify-content:center; color: #aaa; }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bgVideo"><source src="998.mp4" type="video/mp4"></video>
  <div class="bg-dark"></div>
  <div id="overlay"><span>اضغط هنا</span></div>
  <audio id="music" loop><source src="5554.m4a" type="audio/mpeg"></audio>

  <div class="main" id="main">
    <div class="wrap">
      <div class="pfp-wrap reveal">
        <img id="baseAvatar" class="pfpBase" src="https://cdn.discordapp.com/embed/avatars/0.png">
        <img id="decorAvatar" class="pfpDecor">
      </div>
      <h1 class="reveal">CAPONI 🇩🇪</h1>
      <div class="quote reveal">Whoever revives a dead heart, he is for it</div>

      <div class="discord reveal" id="discordBox">
        <div class="miniPfpWrap" id="pfpContainer">
          <img id="discordAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png">
          <img id="discordDecorMini">
        </div>
        <img id="activityImage">
        <div class="discord-info">
          <div id="discordName">CAPONI 🇩🇪</div>
          <div id="discordStatusText">
             <img id="statusImg" class="status-img" style="display:none;">
             <span id="statusRawText">Loading...</span>
          </div>
          <div id="discordActivity"></div>
        </div>
      </div>

      <div class="socials reveal">
        <a href="https://discord.com/users/1159527398098882703" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
        <a href="https://www.instagram.com/caponi.11" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://spotify.com" target="_blank" title="Spotify"><i class="fab fa-spotify"></i></a>
        <a href="https://www.tiktok.com/@caponi.666" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
      </div>
      <div class="views reveal"><i class="fa-regular fa-eye"></i> VU: <span id="viewsText">...</span></div>
    </div>
  </div>

  <script>
    const USER_ID = "1159527398098882703";
    const statusIcons = {
      online: "https://raw.githubusercontent.com/leonardosnt/discord-status-icons/master/png/online.png",
      idle: "https://raw.githubusercontent.com/leonardosnt/discord-status-icons/master/png/idle.png",
      dnd: "https://raw.githubusercontent.com/leonardosnt/discord-status-icons/master/png/dnd.png",
      offline: "https://raw.githubusercontent.com/leonardosnt/discord-status-icons/master/png/offline.png"
    };

    document.getElementById("overlay").addEventListener("click", function() {
      this.style.opacity = "0";
      setTimeout(() => {
        this.style.display = "none";
        document.getElementById("main").style.display = "flex";
        document.querySelectorAll(".reveal").forEach((el, i) => {
          setTimeout(() => el.classList.add("show"), 110 * i);
        });
        const audio = document.getElementById("music");
        audio.volume = 0.5;
        audio.play().catch(e => console.log("Audio play failed:", e));
      }, 1000);
    });

    async function updateLanyard() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        if (!res.ok) return;
        const { data } = await res.json();
        const u = data.discord_user;
        const avatarUrl = `https://cdn.discordapp.com/avatars/${USER_ID}/${u.avatar}.png?size=256`;
        document.getElementById("baseAvatar").src = avatarUrl;
        document.getElementById("discordAvatar").src = avatarUrl;
        const decor = u.avatar_decoration_data;
        if(decor) {
          const dUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${decor.asset}.png?size=256`;
          document.getElementById("decorAvatar").src = dUrl;
          document.getElementById("discordDecorMini").src = dUrl;
        }
        const st = data.discord_status;
        document.getElementById("statusImg").src = statusIcons[st] || statusIcons.offline;
        document.getElementById("statusImg").style.display = "inline-block";
        document.getElementById("statusRawText").innerText = st.charAt(0).toUpperCase() + st.slice(1);
        const activityDiv = document.getElementById("discordActivity");
        const actImg = document.getElementById("activityImage");
        const pfpCont = document.getElementById("pfpContainer");
        if (data.listening_to_spotify) {
            pfpCont.style.display = "none"; actImg.style.display = "block";
            actImg.src = data.spotify.album_art_url;
            activityDiv.innerHTML = `listens to <b>Spotify</b><br>${data.spotify.song}`;
        } else if (data.activities.length > 0) {
            const act = data.activities.find(a => a.type !== 4);
            pfpCont.style.display = "block"; actImg.style.display = "none";
            if (act) { activityDiv.innerText = ` ${act.name}`; } 
            else { activityDiv.innerText = "No activity"; }
        } else {
            pfpCont.style.display = "block"; actImg.style.display = "none";
            activityDiv.innerText = "Inactive";
        }
      } catch(e) {}
    }

    async function updateViews() {
        try {
            const res = await fetch(`https://api.countapi.xyz/hit/caponi-page/main`);
            const data = await res.json();
            document.getElementById("viewsText").textContent = data.value;
        } catch(e) { document.getElementById("viewsText").textContent = "—"; }
    }

    updateViews();
    setInterval(updateLanyard, 5000);
    updateLanyard();
  </script>
</body>
</html>
